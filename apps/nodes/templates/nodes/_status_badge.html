{# 状态徽标子模板 #}
{% if status == 'online' %}
<span class="badge bg-success"><i class="bi bi-check-circle-fill"></i> 在线</span>
{% elif status == 'offline' %}
<span class="badge bg-danger"><i class="bi bi-x-circle-fill"></i> 离线</span>
{% else %}
<span class="badge bg-secondary"><i class="bi bi-question-circle-fill"></i> 未知</span>
{% endif %}
