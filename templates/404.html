{% extends "base.html" %}

{% block title %}404 - 页面未找到{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-body text-center py-5">
                <i class="bi bi-signpost-2" style="font-size: 4rem; color: var(--gray-400);"></i>
                <h3 class="mt-4">404</h3>
                <p class="text-muted">页面未找到</p>
                <p class="small text-muted">您访问的页面不存在或已被移除</p>
                <a href="{% url 'dashboard:index' %}" class="btn btn-primary mt-3">返回首页</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
